<html>
<head></head>
<body>
  <style>
    nav {
      position: sticky;
      top: 0;
      width: 100%;
      height: 70px;
      background-color: var(--color-bg-surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 2rem;
      z-index: 1000;

      .logo h1 {
        font-family: 'Damion', cursive;
        color: var(--color-primary);
        font-size: 34px;
        margin: 0;
      }

      button {
        padding: 0.5em 1em;
        background-color: var(--color-primary);
        border: none;
        border-radius: 10px;
        anchor-name: --menu;
      }

      #menu {
        position: absolute;
        background-color: var(--color-bg-surface);
        border-radius: 0 0 20px 20px;
        border: none;
        width: 100%;
        padding: 1em 2em;
        position-anchor: --menu;
        left: 0;
        right: 0;
        position-area: bottom;

        ul {
          display: flex;
          flex-direction: column;
          align-items: start;
          justify-content: center;
          gap: .5em;
          list-style-type: none;

          a {
            text-decoration: none;
            color: var(--color-txt-primary);
            font-size: 17px;
          }
        }

      }
    }
    @media screen and (min-width: 1024px) {
      .mobile-only {display: none;}
      .desktop-only {display: block;}

      nav {
        .nav-links {
          list-style: none;
          display: flex;
          gap: 1.5rem;

          li a {
            text-decoration: none;
            color: var(--color-txt-primary);
            font-size: 18px;
            transition: color 0.2s ease;

            &:hover {
              color: var(--color-primary);
            }
          }
        }
      }
    }
  </style>
  <nav>
    <div class="logo">
      <h1>RideShare</h1>
    </div>
    <ul class="nav-links desktop-only">
      <li><a href="/index.html">Home</a></li>
      <li><a href="/pages/fleet.html">Fleet</a></li>
      <li><a href="/pages/faqs.html">Faqs</a></li>
    </ul>
    <button id="menuBtn" popovertarget="menu" class="mobile-only">
      <img src="/assets/icons/hamburger.svg" alt="hamburger.svg" loading="lazy" draggable="false">
    </button>
    <div popover id="menu" class="mobile-only">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Our Fleet</a></li>
        <li><a href="#">Faqs</a></li>
      </ul>
    </div>
  </nav>
</body>
</html>
