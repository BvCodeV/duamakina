<html>
<head></head>
<body>
  <style>
    nav {
      position: sticky;
      position: relative;
      top: 0;
      width: 100%;
      height: 70px;
      background-color: var(--color-bg-surface);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.4rem 1rem;
      border-bottom: 1px solid var(--color-border);
      z-index: 1000;

      .logo {
        text-decoration: none;
        img {
          height: 45px;
          width: auto;
          align-self: center;
        }
      }

      button {
        padding: 0.5em 1em;
        background-color: var(--color-primary);
        border: none;
        border-radius: 10px;
        anchor-name: --menu;
      }

      #menu {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        right: 0;
        background-color: var(--color-bg-surface);
        border-radius: 0 0 20px 20px;
        border: none;
        width: 100%;
        padding: 1em 2em;
        margin: 0;
        z-index: 1001;

        &.is-open {
          display: block;
        }

        ul {
          display: flex;
          flex-direction: column;
          align-items: start;
          justify-content: center;
          gap: .5em;
          list-style-type: none;

          a {
            text-decoration: none;
            color: var(--color-txt-primary);
            font-size: 17px;
          }
        }

      }
    }
    .desktop-only {display: none;}
    @media screen and (min-width: 745px) {
      .mobile-only {display: none;}
      .desktop-only {display: block;}

      nav {
        padding: 0.4rem 4rem;
        padding-right: 6em;
        .nav-links {
          list-style: none;
          display: flex;
          gap: 1.5rem;

          li a {
            text-decoration: none;
            color: var(--color-txt-primary);
            font-size: 18px;
            transition: color 0.2s ease;

            &:hover {
              color: var(--color-primary);
            }
          }
        }
      }
    }
  </style>
  <nav>
    <div class="logo">
      <a href="/index.html"><img src="https://jdhigikorvtxhslxudcs.supabase.co/storage/v1/object/public/duamakina-img/public/logo.webp" alt="dua makina logo"></a>
    </div>
    <ul class="nav-links desktop-only">
      <li><a href="/index.html" data-i18n="nav.home">Home</a></li>
      <li><a href="/pages/fleet.html" data-i18n="nav.fleet">Fleet</a></li>
      <li><a href="/pages/faqs.html" data-i18n="nav.faqs">Faqs</a></li>
    </ul>
    <button id="menuBtn" type="button" class="mobile-only" aria-controls="menu" aria-expanded="false">
      <img src="/assets/icons/hamburger.svg" alt="hamburger.svg" loading="lazy" draggable="false">
    </button>
    <div id="menu" class="mobile-only">
      <ul>
        <li><a href="/index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="/pages/fleet.html" data-i18n="nav.fleet">Our Fleet</a></li>
        <li><a href="/pages/faqs.html" data-i18n="nav.faqs">Faqs</a></li>
      </ul>
    </div>
  </nav>
  <script src="/scripts/lang.js"></script>
</body>
</html>
