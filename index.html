<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RideShare</title>
  <meta name="application-name" content="RideShare">
  <meta 
  name="description" 
  content="RideShare is a platform for connecting riders with drivers for convenient and affordable transportation.
  ">
  <meta 
  name="keywords" 
  content="ride share, carpooling, transportation, ridesharing, driver, rider, travel, commute, city, urban, sustainable, eco-friendly, cost-effective, convenient
  ">
  <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
  <link rel="canonical" href="https://rideshare.vercel.app/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Damion&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/index.css">
</head>
<body>
  <header role="heading">
    <div class="left-sec">
      <a href="+355681234567">
        <img src="assets/icons/phone.svg" alt="Phone Icon">
        +355 68 123 4567
      </a>
      <a href="mailto:info@rideshare.com">
        <img src="assets/icons/mail.svg" alt="Mail Icon">
        info@rideshare.com
      </a>
    </div>
    <div class="right-sec">
      <div>
        <img src="assets/icons/lang.svg" alt="Language Icon">
        <select name="lang" id="langSelect">
          <option value="en">🇬🇧 English</option>
          <option value="al">🇦🇱 Albanian</option>
          <option value="fr">🇫🇷 French</option>
          <option value="it">🇮🇹 Italian</option>
          <option value="de">🇩🇪 German</option>
        </select>
      </div>
      <select name="currency" id="currencySelect">
        <option value="USD">$ USD</option>
        <option value="EUR">€ EUR</option>
        <option value="ALL">L ALL</option>
        <option value="GBP">£ GBP</option>
      </select>
    </div>
  </header>
  <nav role="navigation">
    <div class="logo">
      <h1>RideShare</h1>
    </div>
    <ul class="nav-links">
      <li><a href="#">Home</a></li>
      <li><a href="#">Fleet</a></li>
      <li><a href="#">Faqs</a></li>
    </ul>
  </nav>

  <main>
    <section id="hero">
      <picture>
        <!-- Mobile -->
        <source media="(max-width: 480px)" srcset="image-mobile.jpg" />
        <!-- Tablet -->
        <source media="(max-width: 768px)" srcset="image-tablet.jpg" />
        <!-- Laptop -->
        <source media="(max-width: 1450px)" srcset="https://res.cloudinary.com/dhn1mczy5/image/upload/v1773169838/hero-bg-1280.avif" />
        <!-- Desktop -->
        <img src="https://res.cloudinary.com/dhn1mczy5/image/upload/v1773169837/hero-bg-1990px.avif" alt="main bg" />
      </picture>
      <div class="left-con">
        <h1>Explore Albania <span>Your Way</span></h1>
        <p>Rent a car with zero hidden fees. Pay cash on arrival. No credit card needed.</p>
      </div>
      <div class="right-con">
        <form method="post" id="filterBar">
          <div class="locations-con">
            <div class="pickup-loc location-inpt" >
              <label for="pickup">Pickup Location</label>
              <img src="/assets/icons/location.svg" alt="location icon" loading="lazy">
              <input type="text" id="pickup" list="locations" name="pickup" placeholder="e.g Tirana City Center" required>
            </div>
            <div class="dropoff-loc location-inpt" style="display: none;">
              <label for="dropoff">Drop-off Location</label>
              <img src="/assets/icons/location.svg" alt="location icon" loading="lazy">
              <input type="text" id="dropoff" list="locations" name="dropoff" placeholder="e.g Tirana City Center" required>
            </div>
            <div class="dropoff-check">
              <input type="checkbox" id="dropoff-check" name="dropoff-check" checked>
              <label for="dropoff-check">Drop-off at same location</label>
            </div>
            <datalist id="locations">
                <option value="Tirana City Center" />
                <option value="Tirana Airport (TIA)" />
                <option value="Durrës" />
                <option value="Saranda" />
                <option value="Vlorë" />
            </datalist>
          </div>
          <div class="date-time-con">
            <div class="date-time-pickup">
              <div class="date">
                <label for="date">Pick-up Date</label>
                <img src="/assets/icons/calendar.svg" alt="Calendar Icon" loading="lazy">
                <input type="date" id="pickupDate" name="date" required>
              </div>
              <div class="time">
                <label for="time">Pick-up Time</label>
                <img src="/assets/icons/time.svg" alt="time" loading="lazy">
                <select name="time" id="pickupTime">
                  <option value="00:00">12:00 AM</option>
                  <option value="00:30">12:30 AM</option>
                  <option value="01:00">1:00 AM</option>
                  <option value="01:30">1:30 AM</option>
                  <option value="02:00">2:00 AM</option>
                  <option value="02:30">2:30 AM</option>
                  <option value="03:00">3:00 AM</option>
                  <option value="03:30">3:30 AM</option>
                  <option value="04:00">4:00 AM</option>
                  <option value="04:30">4:30 AM</option>
                  <option value="05:00">5:00 AM</option>
                  <option value="05:30">5:30 AM</option>
                  <option value="06:00">6:00 AM</option>
                  <option value="06:30">6:30 AM</option>
                  <option value="07:00">7:00 AM</option>
                  <option value="07:30">7:30 AM</option>
                  <option value="08:00">8:00 AM</option>
                  <option value="08:30">8:30 AM</option>
                  <option value="09:00">9:00 AM</option>
                  <option value="09:30">9:30 AM</option>
                  <option value="10:00">10:00 AM</option>
                  <option value="10:30">10:30 AM</option>
                  <option value="11:00">11:00 AM</option>
                  <option value="11:30">11:30 AM</option>
                  <option value="12:00">12:00 PM</option>
                  <option value="12:30">12:30 PM</option>
                  <option value="13:00">1:00 PM</option>
                  <option value="13:30">1:30 PM</option>
                  <option value="14:00">2:00 PM</option>
                  <option value="14:30">2:30 PM</option>
                  <option value="15:00">3:00 PM</option>
                  <option value="15:30">3:30 PM</option>
                  <option value="16:00">4:00 PM</option>
                  <option value="16:30">4:30 PM</option>
                  <option value="17:00">5:00 PM</option>
                  <option value="17:30">5:30 PM</option>
                  <option value="18:00">6:00 PM</option>
                  <option value="18:30">6:30 PM</option>
                  <option value="19:00">7:00 PM</option>
                  <option value="19:30">7:30 PM</option>
                  <option value="20:00">8:00 PM</option>
                  <option value="20:30">8:30 PM</option>
                  <option value="21:00">9:00 PM</option>
                  <option value="21:30">9:30 PM</option>
                  <option value="22:00">10:00 PM</option>
                  <option value="22:30">10:30 PM</option>
                  <option value="23:00">11:00 PM</option>
                  <option value="23:30">11:30 PM</option>
                </select>
              </div>
            </div>
            <div class="date-time-dropoff">
              <div class="date">
                <label for="date">Drop-off Date</label>
                <img src="/assets/icons/calendar.svg" alt="Calendar Icon" loading="lazy">
                <input type="date" id="dropoffDate" name="date" required>
              </div>
              <div class="time">
                <label for="time">Drop-off Time</label>
                <img src="/assets/icons/time.svg" alt="time" loading="lazy">
                <select name="time" id="dropoffTime">
                  <option value="00:00">12:00 AM</option>
                  <option value="00:30">12:30 AM</option>
                  <option value="01:00">1:00 AM</option>
                  <option value="01:30">1:30 AM</option>
                  <option value="02:00">2:00 AM</option>
                  <option value="02:30">2:30 AM</option>
                  <option value="03:00">3:00 AM</option>
                  <option value="03:30">3:30 AM</option>
                  <option value="04:00">4:00 AM</option>
                  <option value="04:30">4:30 AM</option>
                  <option value="05:00">5:00 AM</option>
                  <option value="05:30">5:30 AM</option>
                  <option value="06:00">6:00 AM</option>
                  <option value="06:30">6:30 AM</option>
                  <option value="07:00">7:00 AM</option>
                  <option value="07:30">7:30 AM</option>
                  <option value="08:00">8:00 AM</option>
                  <option value="08:30">8:30 AM</option>
                  <option value="09:00">9:00 AM</option>
                  <option value="09:30">9:30 AM</option>
                  <option value="10:00">10:00 AM</option>
                  <option value="10:30">10:30 AM</option>
                  <option value="11:00">11:00 AM</option>
                  <option value="11:30">11:30 AM</option>
                  <option value="12:00">12:00 PM</option>
                  <option value="12:30">12:30 PM</option>
                  <option value="13:00">1:00 PM</option>
                  <option value="13:30">1:30 PM</option>
                  <option value="14:00">2:00 PM</option>
                  <option value="14:30">2:30 PM</option>
                  <option value="15:00">3:00 PM</option>
                  <option value="15:30">3:30 PM</option>
                  <option value="16:00">4:00 PM</option>
                  <option value="16:30">4:30 PM</option>
                  <option value="17:00">5:00 PM</option>
                  <option value="17:30">5:30 PM</option>
                  <option value="18:00">6:00 PM</option>
                  <option value="18:30">6:30 PM</option>
                  <option value="19:00">7:00 PM</option>
                  <option value="19:30">7:30 PM</option>
                  <option value="20:00">8:00 PM</option>
                  <option value="20:30">8:30 PM</option>
                  <option value="21:00">9:00 PM</option>
                  <option value="21:30">9:30 PM</option>
                  <option value="22:00">10:00 PM</option>
                  <option value="22:30">10:30 PM</option>
                  <option value="23:00">11:00 PM</option>
                  <option value="23:30">11:30 PM</option>
                </select>
              </div>
            </div>
          </div>
          <button type="submit">
            <img src="/assets/icons/search.svg" alt="Search Icon" loading="lazy">
            <span>Search Available Cars</span>
          </button>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
